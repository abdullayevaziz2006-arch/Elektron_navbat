<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <!-- Logo Icon: 4 vertical expanding pillars on the left -->
  <g fill="currentColor">
    <!-- Pillar 1 (Shortest) -->
    <polygon points="15,42 30,39 30,61 15,58" />
    <!-- Pillar 2 -->
    <polygon points="36,33 54,28 54,72 36,67" />
    <!-- Pillar 3 -->
    <polygon points="60,22 82,14 82,86 60,78" />
    <!-- Pillar 4 (Tallest) -->

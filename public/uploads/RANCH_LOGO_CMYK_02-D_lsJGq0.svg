<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <!-- Logo Icon: 4 stylized diagonal bars (representing Ranch bars) -->
  <g transform="translate(15, 15)">
    <rect x="0" y="25" width="10" height="40" rx="3" transform="skewX(-20)" fill="#ed2c2c" opacity="0.7"/>
    <rect x="18" y="15" width="10" height="50" rx="3" transform="skewX(-20)" fill="#ed2c2c" opacity="0.85"/>
    <rect x="36" y="5" width="10" height="60" rx="3" transform="skewX(-20)" fill="#ed2c2c" opacity="0.95"/>
    <rect x="54" y="0" width="13" height="70" rx="4" transform="skewX(-20)" fill="#ed2c2c"/>
  </g>
  <!-- Logo Text -->
  <g transform="translate(110, 20)">
    <text x="0" y="32" font-family="'Outfit', 'Outfit-Bold', 'Inter', sans-serif" font-weight="900" font-size="34" fill="currentColor" letter-spacing="1">RANCH</text>
    <text x="2" y="56" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="currentColor" opacity="0.6" letter-spacing="4">UNIVERSITY</text>
  </g>
</svg>

  </g>
  <!-- Logo Text -->
  <g fill="currentColor" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" letter-spacing="0.5">
    <text x="130" y="44">RANCH</text>
    <text x="130" y="78">UNIVERSITY</text>
  </g>
</svg>
